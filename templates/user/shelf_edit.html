{% extends "admin/base_adm.html" %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
        
        <!-- Header da Edição -->
        <div class="bg-secondary p-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-2xl font-bold">Editar Estante</h1>
                <p class="text-gray-400 text-sm">Atualize o nome ou a identidade visual da sua coleção.</p>
            </div>
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 20 20"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"></path><path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd"></path></svg>
            </div>
        </div>

        <form action="{{ url_for('user.editar_estante', id=estante.id) }}" method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
            
            <!-- Preview da Capa Atual/Nova -->
            <div class="flex flex-col items-center justify-center space-y-4">
                <div class="relative group w-full h-48 rounded-2xl overflow-hidden border-2 border-dashed border-gray-200">
                    <img id="shelf-preview" 
                         src="{{ url_for('static', filename='uploads/estantes/' + (estante.capa or 'default_shelf.png')) }}" 
                         class="w-full h-full object-cover">
                    
                    <label for="capa" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                        <svg class="w-8 h-8 text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-white text-xs font-bold">Alterar Capa</span>
                    </label>
                    <input type="file" name="capa" id="capa" class="hidden" accept="image/*" onchange="previewShelf(this)">
                </div>
            </div>

            <!-- Campo Nome -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-600 ml-1">Nome da Estante</label>
                <input type="text" name="nome" value="{{ estante.nome }}" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-600 ml-1">Status</label>
                <input type="text" name="estado" value="{{ estante.estado }}" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition-all">
            </div>

            <!-- Ações -->
            <div class="pt-4 flex flex-col gap-3">
                <button type="submit" class="w-full py-4 bg-primary hover:bg-blue-600 text-white font-bold rounded-2xl shadow-lg transition-all">
                    Salvar Alterações
                </button>
                <a href="{{ url_for('user.home') }}" class="text-center py-2 text-gray-400 hover:text-gray-600 text-sm font-bold">
                    Cancelar e Voltar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function previewShelf(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('shelf-preview').src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
