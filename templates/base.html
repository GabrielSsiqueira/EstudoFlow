<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EstudoFlow - Seu Sistema de Estudo Inteligente{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="{{url_for('main.index')}}">
                        <span class="text-2xl font-bold text-brand">Estudo<span class="font-light text-gray-700">Flow</span></span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="{{ url_for('auth.login') }}" class="text-sm font-medium text-gray-700 hover:text-brand transition">Entrar</a>
                    <a href="{{ url_for('auth.register') }}" class="bg-brand text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-brand-dark transition shadow-sm">Começar Grátis</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-100 mt-16">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm text-gray-500">&copy; 2026 EstudoFlow. Organize seus estudos de forma inteligente.</p>
        </div>
    </footer>

</body>
</html>
