<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel - SuaEstante{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="{{url_for('static', filename='css/style.css')}}">
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
   
</head>
<body class="bg-gray-50 font-sans antialiased" x-data="{ sidebarOpen: true }">

    <div class="flex h-screen overflow-hidden">
        
        <aside 
            :class="sidebarOpen ? 'w-64' : 'w-20'" 
            class="bg-secondary text-white hidden md:flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out">
            
            <div class="p-6 flex items-center gap-3 overflow-hidden whitespace-nowrap">
                <div class="bg-primary p-2 rounded-lg flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <span x-show="sidebarOpen" x-transition.opacity class="text-xl font-bold tracking-tight text-white">
                    Sua<span class="text-primary">Estante</span>
                </span>
            </div>

            <nav class="flex-1 px-4 space-y-1 mt-4 overflow-hidden">
                <p x-show="sidebarOpen" class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Menu</p>
                
                {% if current_user.type_user == 'admin' %}
                    <a href="{{ url_for('admin.admin_dashboard') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'admin.admin_dashboard' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Dashboard</span>
                    </a>

                    <a href="{{ url_for('admin.list_users') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'admin.list_users' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Usuários</span>
                    </a>

                    <a href="{{ url_for('admin.list_estantes') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'admin.list_estantes' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Estantes</span>
                    </a>

                    <a href="{{ url_for('admin.list_annotations') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'admin.list_annotations' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Anotações</span>
                    </a>

                    <a href="{{ url_for('admin.list_histories') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'admin.list_histories' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Histórico</span>
                    </a>
                {% else %}
                    <a href="{{ url_for('user.home') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'user.home' %} bg-primary !text-white {% endif %}">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Home</span>
                    </a>

                    <a href="{{ url_for('user.pesquisa_inteligente') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-gray-800 text-gray-300 hover:text-white {% if request.endpoint == 'user.pesquisa_inteligente' %} bg-primary !text-white {% endif %}">
                          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        <span x-show="sidebarOpen" x-transition.opacity>Pesquisa Inteligente</span>
                    </a>
                {% endif %}
            </nav>

            <div class="p-4 border-t border-gray-800">
                <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span x-show="sidebarOpen" x-transition.opacity>Sair</span>
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 flex-shrink-0">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-sm font-semibold text-gray-500">{% block breadcrumb %}Admin / Início{% endblock %}</h2>
                </div>

                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" @click.outside="open = false" class="flex items-center gap-3 focus:outline-none group">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-bold text-secondary leading-none group-hover:text-primary transition">{{ current_user.name }}</p>
                            <p class="text-xs text-gray-500 mt-1 uppercase tracking-tighter">{{ current_user.type_user }}</p>
                        </div>
                        <div class="relative">
                            <a href="{{ url_for('user.perfil') }}">
                                {% if current_user.photo %}
                                    <img src="{{ url_for('static', filename='uploads/user/' + current_user.photo) }}" class="w-10 h-10 rounded-full object-cover border border-gray-200">
                                {% else %}
                                    <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">{{ current_user.name[0] | upper }}</div>
                                {% endif %}
                            </a>
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                        </div>
                    </button>
                    </div>
            </header>

            <main class="flex-1 overflow-y-auto p-8">
                {% block dashboard_content %}{% endblock %}
            </main>

        </div>
    </div>
</body>

{% block js %}{% endblock %}
</html>
